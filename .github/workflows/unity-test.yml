name: Unity Test Framework (dotnet)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dotnet-test:
    name: Run NUnit tests via dotnet test
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Install .NET SDK
        uses: actions/setup-dotnet@1152a9d9ff5fde9bcb0de213610eb1c1f73e57a1 # v4
        with:
          dotnet-version: "9.0.x"

      - name: Run PostStack source tests
        run: dotnet test tests/PostStackSourceTests.csproj --no-restore --verbosity normal
        env:
          DOTNET_CLI_TELEMETRY_OPTOUT: "true"
          DOTNET_NOLOGO: "true"

      - name: Run PostStack shader-variant tests
        run: dotnet test tests/PostStackVariantTests/PostStackVariantTests.csproj --no-restore --verbosity normal
        env:
          DOTNET_CLI_TELEMETRY_OPTOUT: "true"
          DOTNET_NOLOGO: "true"
